<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — UserMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>👤 UserMS</h2>
      <p>Admin Panel</p>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="/dashboard">📊 Dashboard</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <img class="sidebar-avatar" id="sideAvatar" src="" />
        <div class="sidebar-user-info">
          <small>Admin</small>
          <p id="sideName">...</p>
        </div>
      </div>
      <button class="nav-item" onclick="logout()" style="color:#ef4444">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1>Admin Dashboard</h1>
      <span id="adminBadge" class="badge badge-admin">ADMIN</span>
    </div>
    <div class="content">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info"><p>Total Users</p><h3 id="statTotal">-</h3></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">🛡</div>
          <div class="stat-info"><p>Admins</p><h3 id="statAdmins">-</h3></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info"><p>Active</p><h3 id="statActive">-</h3></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">🚫</div>
          <div class="stat-info"><p>Disabled</p><h3 id="statDisabled">-</h3></div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="card">
        <div class="card-header">
          <h3>All Users</h3>
          <div class="search-filter">
            <input type="text" id="search" placeholder="🔍 Search name, email..." oninput="debounceSearch()" />
            <select id="roleFilter" onchange="loadUsers()">
              <option value="ALL">All Roles</option>
              <option value="USER">User</option>
              <option value="ADMIN">Admin</option>
            </select>
            <select id="statusFilter" onchange="loadUsers()">
              <option value="ALL">All Status</option>
              <option value="true">Active</option>
              <option value="false">Disabled</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Contact</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="6" class="empty-state"><p>Loading...</p></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span id="pageInfo">-</span>
          <div class="page-btns" id="pageBtns"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit User</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="alert" id="modalAlert"></div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="editName" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="editEmail" />
    </div>
    <div class="form-group">
      <label>Contact</label>
      <input type="text" id="editContact" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="editRole">
        <option value="USER">USER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>
    <div class="form-group">
      <label>Profile Picture</label>
      <input type="file" id="editPic" accept="image/*" />
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveEdit()" id="saveEditBtn">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const admin = requireAdmin();
  if (!admin) throw new Error('Not admin');

  document.getElementById('sideName').textContent = admin.name;
  document.getElementById('sideAvatar').src = avatarSrc(admin.profilePic);

  let currentPage = 1;
  let searchTimer;

  // Load stats
  async function loadStats() {
    const { data } = await apiFetch('/users/stats');
    if (data.success) {
      document.getElementById('statTotal').textContent = data.stats.total;
      document.getElementById('statAdmins').textContent = data.stats.admins;
      document.getElementById('statActive').textContent = data.stats.active;
      document.getElementById('statDisabled').textContent = data.stats.disabled;
    }
  }

  // Load users table
  async function loadUsers(page = 1) {
    currentPage = page;
    const search = document.getElementById('search').value.trim();
    const role = document.getElementById('roleFilter').value;
    const enabled = document.getElementById('statusFilter').value;

    let params = `?page=${page}&limit=8`;
    if (search) params += `&search=${encodeURIComponent(search)}`;
    if (role !== 'ALL') params += `&role=${role}`;
    if (enabled !== 'ALL') params += `&enabled=${enabled}`;

    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>Loading...</p></td></tr>';

    const { ok, data } = await apiFetch('/users' + params);

    if (!ok || !data.success) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>Failed to load users.</p></td></tr>';
      return;
    }

    if (!data.users.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>No users found.</p></td></tr>';
      renderPagination(data.pagination);
      return;
    }

    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td>
          <div class="user-cell">
            <img class="table-avatar" src="${avatarSrc(u.profilePic)}" onerror="this.src='https://ui-avatars.com/api/?background=4f46e5&color=fff&name=${encodeURIComponent(u.name)}'" />
            <span>${u.name}</span>
          </div>
        </td>
        <td>${u.email}</td>
        <td>${u.contact}</td>
        <td><span class="badge ${u.role === 'ADMIN' ? 'badge-admin' : 'badge-user'}">${u.role}</span></td>
        <td><span class="badge ${u.enabled ? 'badge-active' : 'badge-disabled'}">${u.enabled ? 'Active' : 'Disabled'}</span></td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-primary" onclick="openEdit('${u._id}', '${u.name}', '${u.email}', '${u.contact}', '${u.role}')">✏️ Edit</button>
            <button class="btn btn-sm ${u.enabled ? 'btn-warning' : 'btn-success'}" onclick="toggleUser('${u._id}')">
              ${u.enabled ? '🔒 Disable' : '🔓 Enable'}
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser('${u._id}', '${u.name}')">🗑 Delete</button>
          </div>
        </td>
      </tr>
    `).join('');

    renderPagination(data.pagination);
  }

  function renderPagination(p) {
    document.getElementById('pageInfo').textContent =
      `Showing page ${p.page} of ${p.pages} (${p.total} users)`;

    const btns = document.getElementById('pageBtns');
    btns.innerHTML = '';

    const prev = document.createElement('button');
    prev.className = 'page-btn';
    prev.textContent = '← Prev';
    prev.disabled = p.page <= 1;
    prev.onclick = () => loadUsers(p.page - 1);
    btns.appendChild(prev);

    for (let i = 1; i <= p.pages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === p.page ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => loadUsers(i);
      btns.appendChild(btn);
    }

    const next = document.createElement('button');
    next.className = 'page-btn';
    next.textContent = 'Next →';
    next.disabled = p.page >= p.pages;
    next.onclick = () => loadUsers(p.page + 1);
    btns.appendChild(next);
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadUsers(1), 400);
  }

  // Edit modal
  function openEdit(id, name, email, contact, role) {
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = name;
    document.getElementById('editEmail').value = email;
    document.getElementById('editContact').value = contact;
    document.getElementById('editRole').value = role;
    document.getElementById('editPic').value = '';
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  async function saveEdit() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('editName').value.trim();
    const email = document.getElementById('editEmail').value.trim();
    const contact = document.getElementById('editContact').value.trim();
    const role = document.getElementById('editRole').value;
    const picFile = document.getElementById('editPic').files[0];
    const btn = document.getElementById('saveEditBtn');

    if (!name || !email || !contact) return showAlert('modalAlert', 'All fields required.');

    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    formData.append('contact', contact);
    formData.append('role', role);
    if (picFile) formData.append('profilePic', picFile);

    btn.innerHTML = '<span class="spinner"></span> Saving...';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/users/' + id, { method: 'PUT', body: formData });

    btn.innerHTML = 'Save Changes';
    btn.disabled = false;

    if (ok) {
      closeModal();
      loadUsers(currentPage);
      loadStats();
    } else {
      showAlert('modalAlert', data.message || 'Update failed.');
    }
  }

  async function toggleUser(id) {
    const { ok, data } = await apiFetch('/users/' + id + '/toggle', { method: 'PATCH' });
    if (ok) { loadUsers(currentPage); loadStats(); }
    else alert(data.message || 'Failed.');
  }

  async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    const { ok, data } = await apiFetch('/users/' + id, { method: 'DELETE' });
    if (ok) { loadUsers(currentPage); loadStats(); }
    else alert(data.message || 'Delete failed.');
  }

  // Close modal on overlay click
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Initialize
  loadStats();
  loadUsers();
</script>
</body>
</html>
