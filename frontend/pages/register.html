<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — UserMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>👤 UserMS</h1>
      <p>Create your account</p>
    </div>
    <div class="alert" id="alert"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Contact Number</label>
      <input type="text" id="contact" placeholder="+91 9876543210" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" />
    </div>
    <div class="form-group">
      <label>Profile Picture (optional)</label>
      <div class="avatar-upload">
        <img src="https://ui-avatars.com/api/?background=4f46e5&color=fff&name=User" class="avatar-preview" id="preview" />
        <input type="file" id="profilePic" accept="image/*" onchange="previewImage(event)" />
      </div>
    </div>
    <button class="btn btn-primary" id="regBtn" onclick="doRegister()">Create Account</button>
    <div class="auth-link">
      Already have an account? <a href="/login">Login here</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  if (getToken()) window.location.href = '/login';

  function previewImage(e) {
    const file = e.target.files[0];
    if (file) {
      document.getElementById('preview').src = URL.createObjectURL(file);
    }
  }

  async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const contact = document.getElementById('contact').value.trim();
    const password = document.getElementById('password').value;
    const picFile = document.getElementById('profilePic').files[0];
    const btn = document.getElementById('regBtn');

    if (!name || !email || !contact || !password)
      return showAlert('alert', 'All fields except picture are required.');
    if (password.length < 6)
      return showAlert('alert', 'Password must be at least 6 characters.');

    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    formData.append('contact', contact);
    formData.append('password', password);
    if (picFile) formData.append('profilePic', picFile);

    btn.innerHTML = '<span class="spinner"></span> Creating...';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/auth/register', { method: 'POST', body: formData });

    btn.innerHTML = 'Create Account';
    btn.disabled = false;

    if (ok) {
      saveAuth(data.token, data.user);
      showAlert('alert', 'Account created! Redirecting...', 'success');
      setTimeout(() => { window.location.href = '/profile'; }, 800);
    } else {
      showAlert('alert', data.message || 'Registration failed.');
    }
  }
</script>
</body>
</html>
