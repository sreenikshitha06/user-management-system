<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — UserMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>👤 UserMS</h1>
      <p>User Management System</p>
    </div>
    <div class="alert" id="alert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login</button>
    <div class="auth-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  // If already logged in, redirect
  if (getToken()) {
    const u = getUser();
    window.location.href = u && u.role === 'ADMIN' ? '/dashboard' : '/profile';
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) return showAlert('alert', 'Email and password are required.');

    btn.innerHTML = '<span class="spinner"></span> Logging in...';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });

    btn.innerHTML = 'Login';
    btn.disabled = false;

    if (ok) {
      saveAuth(data.token, data.user);
      showAlert('alert', 'Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'ADMIN' ? '/dashboard' : '/profile';
      }, 800);
    } else {
      showAlert('alert', data.message || 'Login failed.');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
