<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — UserMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>👤 UserMS</h2>
      <p>User Panel</p>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="/profile">🏠 My Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <img class="sidebar-avatar" id="sideAvatar" src="" />
        <div class="sidebar-user-info">
          <small>Logged in as</small>
          <p id="sideName">...</p>
        </div>
      </div>
      <button class="nav-item" onclick="logout()" style="color:#ef4444">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1>My Profile</h1>
    </div>
    <div class="content">
      <div class="alert" id="alert"></div>
      <div class="profile-card">
        <div class="profile-header">
          <img class="profile-pic" id="profilePicDisplay" src="" />
          <div class="profile-info">
            <h2 id="displayName">Loading...</h2>
            <p id="displayEmail"></p>
            <p id="displayRole"></p>
          </div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" disabled style="background:#f8fafc;cursor:not-allowed" />
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input type="text" id="contact" />
        </div>
        <div class="form-group">
          <label>Change Profile Picture</label>
          <input type="file" id="profilePic" accept="image/*" onchange="previewPic(event)" />
        </div>
        <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">💾 Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = requireAuth();
  if (!user) throw new Error('Not logged in');

  // Populate
  function populate(u) {
    document.getElementById('displayName').textContent = u.name;
    document.getElementById('displayEmail').textContent = u.email;
    document.getElementById('displayRole').textContent = '🏷 ' + u.role;
    document.getElementById('name').value = u.name;
    document.getElementById('email').value = u.email;
    document.getElementById('contact').value = u.contact;
    const src = avatarSrc(u.profilePic);
    document.getElementById('profilePicDisplay').src = src;
    document.getElementById('sideAvatar').src = src;
    document.getElementById('sideName').textContent = u.name;
  }

  populate(user);

  // Fetch fresh data
  apiFetch('/auth/me').then(({ data }) => { if (data.success) populate(data.user); });

  function previewPic(e) {
    const f = e.target.files[0];
    if (f) document.getElementById('profilePicDisplay').src = URL.createObjectURL(f);
  }

  async function saveProfile() {
    const name = document.getElementById('name').value.trim();
    const contact = document.getElementById('contact').value.trim();
    const picFile = document.getElementById('profilePic').files[0];
    const btn = document.getElementById('saveBtn');

    if (!name || !contact) return showAlert('alert', 'Name and contact are required.');

    const formData = new FormData();
    formData.append('name', name);
    formData.append('contact', contact);
    if (picFile) formData.append('profilePic', picFile);

    btn.innerHTML = '<span class="spinner"></span> Saving...';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/auth/update-profile', { method: 'PUT', body: formData });

    btn.innerHTML = '💾 Save Changes';
    btn.disabled = false;

    if (ok) {
      saveAuth(getToken(), data.user);
      populate(data.user);
      showAlert('alert', 'Profile updated!', 'success');
    } else {
      showAlert('alert', data.message || 'Update failed.');
    }
  }
</script>
</body>
</html>
